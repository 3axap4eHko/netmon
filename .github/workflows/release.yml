name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      # pnpm version is taken from the "packageManager" field in package.json.
      - uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc
        with:
          workspaces: ". -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # tauri.conf.json and the Rust crate live in crates/netmon-app (not the
      # default src-tauri layout); the frontend is built via the config's
      # beforeBuildCommand. tauri build enables the custom-protocol feature so
      # the bundle embeds the frontend instead of loading the dev server.
      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/netmon-app
          tagName: ${{ github.ref_name }}
          releaseName: "NetMon ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
