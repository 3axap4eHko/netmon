name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

env:
    CARGO_TERM_COLOR: always
    RUST_BACKTRACE: 1

jobs:
    test:
        name: Test
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
                rust: [stable]
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

            - name: Install Rust
              uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
              with:
                  toolchain: ${{ matrix.rust }}
                  components: rustfmt, clippy

            - name: Cache cargo registry
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
              with:
                  path: ~/.cargo/registry
                  key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

            - name: Cache cargo index
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
              with:
                  path: ~/.cargo/git
                  key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

            - name: Cache cargo build
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
              with:
                  path: target
                  key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

            - name: Check formatting
              run: cargo fmt -- --check
              if: matrix.rust == 'stable'

            - name: Run clippy
              run: cargo clippy -- -D warnings
              if: matrix.rust == 'stable'

            - name: Build
              run: cargo build --verbose

            - name: Run tests
              run: cargo test --verbose -- --test-threads=1

            - name: Build release
              run: cargo build --release --verbose

    msrv:
        name: Check MSRV
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

            - name: Read Rust version
              id: rust_version
              shell: bash
              run: |
                  set -euo pipefail
                  version="$(sed -n 's/^rust-version = "\(.*\)"/\1/p' Cargo.toml)"
                  test -n "$version"
                  echo "version=$version" >> "$GITHUB_OUTPUT"

            - name: Install Rust
              uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
              with:
                  toolchain: ${{ steps.rust_version.outputs.version }}

            - name: Check MSRV
              run: cargo check --verbose

    coverage:
        name: Code Coverage
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
              with:
                  components: llvm-tools-preview

            - name: Install cargo-llvm-cov
              uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5
              with:
                  tool: cargo-llvm-cov

            - name: Generate coverage
              run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info -- --test-threads=1

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@e53489f4d376d79066609109e7a95a29eb3740b1
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: lcov.info
                  fail_ci_if_error: false

    bench:
        name: Benchmarks
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

            - name: Run benchmarks
              run: cargo bench --no-run

    security-audit:
        name: Security Audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

            - name: Install cargo-audit
              run: cargo install cargo-audit --version 0.22.2 --locked

            - name: Run security audit
              run: cargo audit
